<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo · single player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>✨ Bingo Challenge ✨</h1>

        <div class="stats">
            <div class="lines-badge">
                <span class="label">Lines completed</span>
                <span class="value" id="playerLines">0</span>
            </div>
            <button class="restart-btn" id="restartBtn">🔄 New game</button>
        </div>

        <div class="board-wrapper">
            <div class="board" id="player-board"></div>
        </div>

        <!-- Win overlay (hidden by default) -->
        <div class="win-overlay hidden" id="winOverlay">
            <div class="win-message">
                <h2>🎉 You Win! 🎉</h2>
                <p>Congratulations!</p>
                <button class="play-again" id="playAgainBtn">Play again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
