<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single‑Player Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎯 Single‑Player Bingo</h1>

        <div class="boards">
            <!-- Single board -->
            <div class="board-wrapper" id="player-wrapper">
                <h2>Your Board <span class="line-count" id="playerLines">0</span></h2>
                <div class="board" id="player-board"></div>
            </div>
        </div>

        <button class="restart-btn" id="restartBtn">🔄 New Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
